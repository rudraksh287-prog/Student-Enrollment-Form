<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://login2explore.com/jpdb/resources/js/0.3.0/jpdb-commons.js"></script>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="w-50">
            <h2 class="text-center mb-4">Student Enrollment Form</h2>
            <form id="studentForm">
                <div class="mb-3">
                    <label for="rollNo" class="form-label">Roll No</label>
                    <input type="text" class="form-control" id="rollNo" onchange="getStudent()">
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" disabled>
                </div>
                <div class="mb-3">
                    <label for="class" class="form-label">Class</label>
                    <input type="text" class="form-control" id="class" disabled>
                </div>
                <div class="mb-3">
                    <label for="birthDate" class="form-label">Birth Date</label>
                    <input type="date" class="form-control" id="birthDate" disabled>
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Address</label>
                    <input type="text" class="form-control" id="address" disabled>
                </div>
                <div class="mb-3">
                    <label for="enrollmentDate" class="form-label">Enrollment Date</label>
                    <input type="date" class="form-control" id="enrollmentDate" disabled>
                </div>
                <div class="text-center">
                    <button type="button" class="btn btn-primary me-2" id="save" onclick="saveStudent()" disabled>Save</button>
                    <button type="button" class="btn btn-warning me-2" id="update" onclick="updateStudent()" disabled>Update</button>
                    <button type="button" class="btn btn-secondary" id="reset" onclick="resetForm()" disabled>Reset</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
